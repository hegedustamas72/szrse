<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sportegyesület Kapcsolatok</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
    /* Alap body beállítások */
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        text-align: center;
        background: linear-gradient(135deg, #000000, #FF9900);
    }

    h1 {
        margin-bottom: 40px;
        font-size: 2em;
        text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
    }

    /* Gombok teljes szélességűek, mobil optimalizáltak */
    .button-container {
        display: flex;
        flex-direction: column;
        gap: 15px;
        width: 90%;
        max-width: 400px;
    }

    .social-button {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        padding: 18px;
        font-size: 20px;
        text-decoration: none;
        border-radius: 15px;
        transition: all 0.3s ease;
        color: #fff;
        position: relative;
        overflow: hidden;
    }

    .social-button i {
        font-size: 26px;
    }

    /* Hover effektek - finom fénylő animáció */
    .social-button::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 100%;
        height: 100%;
        background: rgba(255,255,255,0.2);
        transform: skewX(-20deg);
        transition: all 0.5s ease;
    }

    .social-button:hover::before {
        left: 100%;
    }

    .social-button:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }

    /* Platform színek */
    .facebook { background: #3b5998; }
    .instagram { background: #E1306C; }
    .tiktok { background: #69C9D0; color: #000; }
    .weboldal { background: #FF9900; color: #000; }

    /* Mobil optimalizálás - nagyobb gombok kisebb képernyőn */
    @media (max-width: 400px) {
        .social-button {
            font-size: 18px;
            padding: 16px;
        }

        .social-button i {
            font-size: 22px;
        }
    }
</style>
</head>
<body>
<h1>Csatlakozz hozzánk!</h1>
<div class="button-container">
    <a href="https://www.facebook.com/szegedirse" class="social-button facebook" target="_blank">
        <i class="fab fa-facebook-f"></i> Facebook
    </a>
    <a href="https://www.instagram.com/szegedirse" class="social-button instagram" target="_blank">
        <i class="fab fa-instagram"></i> Instagram
    </a>
    <a href="https://www.tiktok.com/@egyesulet" class="social-button tiktok" target="_blank">
        <i class="fab fa-tiktok"></i> TikTok
    </a>
    <a href="https://www.szegedvolley.com" class="social-button weboldal" target="_blank">
        <i class="fas fa-globe"></i> Weboldal
    </a>
</div>
</body>
</html>
