<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Szeged Volley Kapcsolatok</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
    }

    body {
        font-family: Arial, sans-serif;
        color: #fff;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        position: relative;
    }

    /* Két oldal: bal narancs, jobb fekete (nem átmenet, hanem éles határ) */
    .bg-left,
    .bg-right {
        position: fixed;
        top: 0;
        width: 50%;
        height: 100%;
        z-index: -2;
    }
    .bg-left { background: #FF6600; }
    .bg-right { right: 0; background: #000000; }

    /* Finom overlay, hogy ne legyen túlságosan agresszív a két szín */
    .overlay-left,
    .overlay-right {
        position: fixed;
        top: 0;
        width: 50%;
        height: 100%;
        z-index: -1;
    }
    .overlay-left { left: 0; background: rgba(255,102,0,0.4); }
    .overlay-right { right: 0; background: rgba(0,0,0,0.4); }

    .top-logo {
        width: 130px;
        margin-top: 18px;
        margin-bottom: 22px;
    }

    h1 {
        font-size: 2em;
        margin-bottom: 30px;
        text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
    }

    .button-container {
        width: 90%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .social-button {
        font-size: 20px;
        padding: 18px;
        border-radius: 14px;
        text-decoration: none;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        position: relative;
        overflow: hidden;
        transition: transform .25s, box-shadow .25s;
    }

    .social-button i { font-size: 26px; }

    .social-button:hover {
        transform: scale(1.08);
        box-shadow: 0 8px 28px rgba(0,0,0,0.4);
    }

    /* Platform színek */
    .facebook { background: #3b5998; }
    .instagram { background: #E1306C; }
    .tiktok { background: #69C9D0; color: #000; }
    .weboldal { background: #000; }

    @media (max-width: 400px) {
        .social-button { font-size: 18px; padding: 16px; }
        .social-button i { font-size: 22px; }
        .top-logo { width: 110px; }
    }
</style>
</head>
<body>

<!-- Két háttérszín -->
<div class="bg-left"></div>
<div class="bg-right"></div>

<!-- Lágy overlay a két háttérre -->
<div class="overlay-left"></div>
<div class="overlay-right"></div>

<!-- Logó felül középen -->
<img src="IMG_0053.jpeg" alt="Szeged Volley logó" class="top-logo">

<h1>Csatlakozz hozzánk!</h1>

<div class="button-container">
    <a href="https://www.facebook.com/szegedirse" class="social-button facebook" target="_blank">
        <i class="fab fa-facebook-f"></i> Facebook
    </a>
    <a href="https://www.instagram.com/szegedirse" class="social-button instagram" target="_blank">
        <i class="fab fa-instagram"></i> Instagram
    </a>
    <a href="https://www.tiktok.com/@szegedirse" class="social-button tiktok" target="_blank">
        <i class="fab fa-tiktok"></i> TikTok
    </a>
    <a href="https://www.szegedvolley.com" class="social-button weboldal" target="_blank">
        <i class="fas fa-globe"></i> Weboldal
    </a>
</div>

</body>
</html>
