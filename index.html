<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Szeged Volley Kapcsolatok</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        color: #fff;
        text-align: center;
        position: relative;
        padding-top: 20px;
        overflow: hidden;
    }

    /* Háttér két részre osztva, átlátszó, de színek pontosak */
    .background-split {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        z-index: 0;
    }
    .bg-left {
        flex: 1;
        background-color: rgba(255,153,0,0.2); /* áttetsző narancs */
    }
    .bg-right {
        flex: 1;
        background-color: rgba(0,0,0,0.2); /* áttetsző fekete */
    }

    /* Logó felül középen */
    .top-logo {
        width: 120px;
        height: auto;
        margin-bottom: 20px;
        z-index: 2;
        position: relative;
    }

    h1 {
        margin-bottom: 35px;
        font-size: 2em;
        text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
        z-index: 2;
        position: relative;
    }

    .button-container {
        width: 90%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        z-index: 2;
        position: relative;
    }

    .social-button {
        font-size: 20px;
        padding: 18px;
        border-radius: 14px;
        text-decoration: none;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        position: relative;
        overflow: hidden;
        transition: transform .3s, box-shadow .3s;
    }

    .social-button i { font-size: 28px; }

    .social-button::before {
        content: '';
        position: absolute;
        top: 0; left: -120%;
        width: 120%;
        height: 100%;
        background: rgba(255,255,255,0.15);
        transform: skewX(-20deg);
        transition: left .6s ease;
    }
    .social-button:hover::before {
        left: 100%;
    }
    .social-button:hover {
        transform: scale(1.06);
        box-shadow: 0 8px 28px rgba(0,0,0,0.4);
    }

    /* Platform színek */
    .facebook { background: #3b5998; }
    .instagram { background: #E1306C; }
    .tiktok { background: #69C9D0; color: #000; }
    .weboldal { background: #000; }

    @media (max-width: 400px) {
        .social-button { font-size: 18px; padding: 16px; }
        .social-button i { font-size: 22px; }
        .top-logo { width: 100px; }
    }
</style>
</head>
<body>

<!-- Háttér div -->
<div class="background-split">
    <div class="bg-left"></div>
    <div class="bg-right"></div>
</div>

<!-- Logó felül -->
<img src="IMF_0053.jpeg" alt="Szeged Volley logó" class="top-logo">

<h1>Csatlakozz hozzánk!</h1>

<div class="button-container">
    <a href="https://www.facebook.com/szegedirse" class="social-button facebook" target="_blank">
        <i class="fab fa-facebook-f"></i> Facebook
    </a>
    <a href="https://www.instagram.com/szegedirse" class="social-button instagram" target="_blank">
        <i class="fab fa-instagram"></i> Instagram
    </a>
    <a href="https://www.tiktok.com/@szegedirse" class="social-button tiktok" target="_blank">
        <i class="fab fa-tiktok"></i> TikTok
    </a>
    <a href="https://www.szegedvolley.com" class="social-button weboldal" target="_blank">
        <i class="fas fa-globe"></i> Weboldal
    </a>
</div>

</body>
</html>
