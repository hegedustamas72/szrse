<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportegyesület Kapcsolatok</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 2em;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 80%;
            max-width: 300px;
            z-index: 2;
        }

        .social-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            font-size: 18px;
            text-decoration: none;
            border-radius: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
            color: #fff;
        }

        .social-button i {
            font-size: 24px;
        }

        .social-button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        /* Platform színek */
        .facebook { background: #3b5998; }
        .instagram { background: #E1306C; }
        .tiktok { background: #69C9D0; color: #000; }
        .weboldal { background: #FF9900; color: #000; }

        /* Animált háttér logó */
        .logo-background {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            background: url('IMG_5495.png') no-repeat center center;
            background-size: contain;
            opacity: 0.05;
            transform: translate(-50%, -50%);
            animation: floatRotate 15s linear infinite;
        }

        @keyframes floatRotate {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            50% { transform: translate(-50%, -50%) rotate(180deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="logo-background"></div>
    <h1>Csatlakozz hozzánk!</h1>
    <div class="button-container">
        <a href="https://www.facebook.com/szegedirse" class="social-button facebook" target="_blank">
            <i class="fab fa-facebook-f"></i> Facebook
        </a>
        <a href="https://www.instagram.com/szegedirse" class="social-button instagram" target="_blank">
            <i class="fab fa-instagram"></i> Instagram
        </a>
        <a href="https://www.tiktok.com/@egyesulet" class="social-button tiktok" target="_blank">
            <i class="fab fa-tiktok"></i> TikTok
        </a>
        <a href="https://www.szegedvolley.com" class="social-button weboldal" target="_blank">
            <i class="fas fa-globe"></i> Weboldal
        </a>
    </div>
</body>
</html>
