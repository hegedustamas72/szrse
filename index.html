<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* Háttér */
.background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('zsuzskahatter.jpg'); /* saját kép */
    background-size: cover;
    background-position: center;
    filter: brightness(1.1);
    z-index: -2;
}

.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.4);
    z-index: -1;
}

/* Logó */
.top-logo {
    position: fixed;
    top: 10px;
    left: 10px;
    width: 120px;
    filter: brightness(1.4) drop-shadow(0 0 6px #aaa);
}

/* Gombok konténer */
.button-container {
    width: 90%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-top: 20px;
}

/* Gombok stílus */
.social-button {
    font-size: 18px;
    padding: 14px;
    border-radius: 14px;
    text-decoration: none;
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: transform .25s, box-shadow .25s, filter .25s;
    border: 1.5px solid rgba(255,255,255,0.6); /* világos szegély */
    box-shadow: 0 6px 15px rgba(0,0,0,0.25); /* emelkedés */
    font-weight: 600;
    background-clip: padding-box;
}

.social-button i {
    font-size: 22px;
}

/* Pasztell színek */
.facebook { background-color: #a3bffa; }
.instagram { background-color: #f7a6c1; }
.tiktok { background-color: #a0e7e5; }
.weboldal { background-color: #dcdcdc; }
.email { background-color: #c9c3ff; }
.contact { background-color: #ffd6a5; }

/* Hover effekt */
.social-button:hover {
    transform: translateY(-3px) scale(1.08);
    box-shadow: 0 12px 30px rgba(0,0,0,0.3);
    filter: brightness(1.05);
}

/* Mobil: két oszlopos elrendezés */
@media (max-width: 600px) {
    .button-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }
    .social-button { font-size: 16px; padding: 12px; }
    .social-button i { font-size: 20px; }
    .top-logo { width: 110px; }
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<img src="zsuzskalogo.jpg" alt="ZsuzskaArt logó" class="top-logo">

<div class="button-container">

    <a href="https://www.facebook.com/zsuzskaart.2025" class="social-button facebook" target="_blank">
        <i class="fab fa-facebook-f"></i> Facebook
    </a>

    <a href="https://www.instagram.com/zsuzskaart.grozner.t.zsuzska" class="social-button instagram" target="_blank">
        <i class="fab fa-instagram"></i> Instagram
    </a>

    <a href="https://www.tiktok.com/@zsuzska.art" class="social-button tiktok" target="_blank">
        <i class="fab fa-tiktok"></i> TikTok
    </a>

    <a href="https://www.zsuzskaart.hu" class="social-button weboldal" target="_blank">
        <i class="fas fa-globe"></i> Weboldal
    </a>

    <a href="zsuzska.vcf" class="social-button contact">
        <i class="fas fa-address-card"></i> Névjegy
    </a>

    <a href="mailto:szrse.marketing@gmail.com" class="social-button email">
        <i class="fas fa-envelope"></i> Email
    </a>

</div>

</body>
</html>
